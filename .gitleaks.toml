title = "Stirilo gitleaks configuration"

# Build on top of gitleaks' default ruleset.
[extend]
useDefault = true

# Allowlist files that intentionally contain placeholder or fixture values.
[allowlist]
description = "Templates and test fixtures with non-secret placeholder values"
paths = [
  # The committed example carries placeholders only, never real values.
  '''\.env\.example$''',
  # The redaction test file holds deliberately secret-shaped fixtures.
  '''packages/redaction/src/redact\.test\.ts$''',
]
